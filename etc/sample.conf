# vLabel Policy Configuration - UCL/JSON Format (.conf)
#
# This is the default policy file for vlabeld daemon.
# Format: UCL (Universal Configuration Language) - a superset of JSON
#
# Installation: Copy to /usr/local/etc/vlabel/policy.conf
# Usage: vlabeld -c /usr/local/etc/vlabel/policy.conf
#        vlabelctl rule load /usr/local/etc/vlabel/policy.conf
#
# Other sample files in this directory:
#   sample.ucl   - UCL format with extensive comments (recommended)
#   sample.json  - Pure JSON format
#   sample.rules - Simple line format for vlabelctl

mode = "permissive";

rules = [
    {
        # Block untrusted executables
        id = 1;
        action = "deny";
        operations = ["exec"];
        object = { type = "untrusted"; };
    },

    {
        # Web domain isolation
        id = 10;
        action = "allow";
        operations = ["read", "write", "open", "stat"];
        subject = { domain = "web"; };
        object = { domain = "web"; };
    },

    {
        # Database domain isolation
        id = 11;
        action = "allow";
        operations = ["read", "write", "open", "stat"];
        subject = { domain = "database"; };
        object = { domain = "database"; };
    },

    {
        # Admin tools only on host (subject must be on host, not in jail)
        id = 20;
        action = "allow";
        operations = ["exec"];
        subject = { type = "admin"; };
        object = { type = "admin-tool"; };
        subj_ctx = { jail = "host"; };
    },

    {
        # Block admin tools in jails (subject is in any jail)
        id = 21;
        action = "deny";
        operations = ["exec"];
        object = { type = "admin-tool"; };
        subj_ctx = { jail = "any"; };
    },

    {
        # Sandbox resource access (subject must be sandboxed)
        id = 30;
        action = "allow";
        operations = ["read"];
        object = { level = "sandbox-only"; };
        subj_ctx = { sandboxed = true; };
    },

    {
        # Block sandbox resources from non-sandboxed (subject not sandboxed)
        id = 31;
        action = "deny";
        operations = ["read", "write", "exec"];
        object = { level = "sandbox-only"; };
        subj_ctx = { sandboxed = false; };
    },

    {
        # su transition
        id = 50;
        action = "transition";
        operations = ["exec"];
        subject = { type = "user"; };
        object = { type = "setuid"; name = "su"; };
        newlabel = "type=admin,domain=system";
    },

    {
        # sudo transition
        id = 51;
        action = "transition";
        operations = ["exec"];
        subject = { type = "user"; };
        object = { type = "setuid"; name = "sudo"; };
        newlabel = "type=admin,domain=system";
    },

    {
        # Trusted processes
        id = 100;
        action = "allow";
        operations = ["all"];
        subject = { type = "trusted"; };
    },

    {
        # System domain
        id = 101;
        action = "allow";
        operations = ["all"];
        subject = { domain = "system"; };
    },

    {
        # Default deny
        id = 999;
        action = "deny";
        operations = ["all"];
    }
];
